<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site_name }}</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Space Grotesk', 'sans-serif'],
                    },
                    colors: {
                        chessDark: '#1a1a1a',
                        chessGray: '#262626',
                        chessAccent: '#eab308', 
                        chessText: '#e5e5e5',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #1a1a1a;
            color: #e5e5e5;
        }
        .glass-panel {
            background: rgba(38, 38, 38, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #404040;
            border-radius: 3px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #525252;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <!-- NAVBAR -->
    <nav class="border-b border-gray-800 bg-chessDark/90 backdrop-blur fixed w-full z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Logo -->
                <div class="flex items-center">
                    <a href="/" class="flex items-center gap-3">
                        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="h-10 w-auto object-contain">
                        <span class="text-xl font-bold tracking-tight text-white">{{ site_name }}</span>
                    </a>
                </div>
                
                <!-- Desktop Menu -->
                <div class="hidden md:block">
                    <div class="ml-10 flex items-baseline space-x-8">
                        {% for link in nav_links %}
                        <a href="{{ link.url }}" class="hover:text-chessAccent transition px-3 py-2 rounded-md text-sm font-medium flex items-center gap-2">
                            <i class="fa-solid {{ link.icon }} text-xs"></i>
                            {{ link.name }}
                        </a>
                        {% endfor %}
                    </div>
                </div>

                <!-- Mobile Menu Button -->
                <div class="-mr-2 flex md:hidden">
                    <button type="button" class="inline-flex items-center justify-center p-2 rounded-md text-gray-400 hover:text-white hover:bg-gray-700 focus:outline-none" aria-controls="mobile-menu" aria-expanded="false">
                        <span class="sr-only">Open main menu</span>
                        <i class="fa-solid fa-bars"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="flex-grow pt-16">
        {% block content %}{% endblock %}
    </main>

    <!-- FOOTER -->
    <footer class="glass-panel mt-12 border-t border-gray-800">
        <div class="max-w-7xl mx-auto py-12 px-4 sm:px-6 lg:px-8">
            <div class="grid grid-cols-2 md:grid-cols-3 gap-8">
                <div>
                    <h3 class="text-sm font-semibold text-chessAccent tracking-wider uppercase">Support</h3>
                    <ul class="mt-4 space-y-4">
                        <li><a href="/guide" class="text-base text-gray-400 hover:text-white">Guides</a></li>
                        <li><a href="/about" class="text-base text-gray-400 hover:text-white">About</a></li>
                    </ul>
                </div>
                <div class="col-span-2 md:col-span-2">
                    <div class="flex items-center gap-2 mb-4">
                        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="h-9 w-auto object-contain">
                        <span class="font-bold text-xl">{{ site_name }}</span>
                    </div>
                    <p class="text-gray-400 text-sm">
                        Building the future of chess analysis.
                    </p>
                </div>
            </div>
            <div class="mt-8 border-t border-gray-700 pt-8 text-center">
                <p class="text-gray-500 text-sm">&copy; 2024 {{ site_name }}. All rights reserved.</p>
            </div>
        </div>
    </footer>

</body>
</html>
